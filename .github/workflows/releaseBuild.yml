name: MSBuild

on:
  release:
    types: [published]

env:
  SOLUTION_FILE_PATH: .

permissions: write-all

jobs:
  build:
    runs-on: windows-2025-vs2026

    steps:
    - uses: actions/checkout@v6

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Restore NuGet packages
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: nuget restore ${{env.SOLUTION_FILE_PATH}}

    - name: Build Release
      working-directory: ${{env.GITHUB_WORKSPACE}}
      run: msbuild /m /p:Configuration=Release ${{env.SOLUTION_FILE_PATH}} /p:PostBuildEventUseInBuild=false

    - name: Package Artifacts
      run: |
        $releaseDir = "Release"
        New-Item -ItemType Directory -Name artifacts -Force | Out-Null
        New-Item -ItemType Directory -Name "nvse\plugins" -path $releaseDir -Force | Out-Null
        Copy-Item -Path "$releaseDir\CrashLogger.dll", "$releaseDir\CrashLogger.pdb" -Destination "$releaseDir\nvse\plugins"
        Compress-Archive -Path "$releaseDir\nvse" -DestinationPath "artifacts\CrashLogger-${{ github.event.release.tag_name }}.zip"
      shell: pwsh

    - name: Upload mod to NexusMods
      id: upload
      uses: Nexus-Mods/upload-action@main
      with:
        api_key: ${{ secrets.NEXUSMODS_API_KEY }}
        file_group_id: ${{ vars.NEXUSMODS_GROUP_ID }}
        filename: "artifacts\\CrashLogger-${{ github.event.release.tag_name }}.zip"
        display_name: "Crash Logger"
        file_category: "main"
        version: ${{ github.event.release.tag_name }}